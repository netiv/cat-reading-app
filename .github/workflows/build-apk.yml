name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: Java 설정 (JDK 17)
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: 누락 파일/폴더 생성
        run: |
          mkdir -p android/capacitor-cordova-android-plugins/src/main/java
          mkdir -p android/capacitor-cordova-android-plugins/src/main/res
          cat > android/capacitor-cordova-android-plugins/cordova.variables.gradle << 'GRADLE'
          ext {
            cdvMinSdkVersion = project.hasProperty('minSdkVersion') ? rootProject.ext.minSdkVersion : 22
            cdvPluginPostBuildExtras = []
            cordovaConfig = [:]
          }
          GRADLE

      - name: Gradle 실행 권한 부여
        run: chmod +x android/gradlew

      - name: APK 빌드
        working-directory: android
        run: ./gradlew assembleDebug --no-daemon

      - name: APK 업로드
        uses: actions/upload-artifact@v4
        with:
          name: cat-reading-app-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
